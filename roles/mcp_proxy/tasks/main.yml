---

- name: Assert that all required inputs have been provided.
  ansible.builtin.assert:
    that:
      - mcp_proxy_version is not none
      - mcp_proxy_transport_type in ['sse', 'streamable-http']
      - mcp_proxy_servers is defined
      - mcp_proxy_servers is mapping

- name: Checking if architecture is amd64.
  ansible.builtin.set_fact:
    mcp_proxy_download_arch: "amd64"
  when: '"x86_64" in ansible_architecture'

- name: Checking if architecture is arm64.
  ansible.builtin.set_fact:
    mcp_proxy_download_arch: "arm64"
  when: '"aarch" in ansible_architecture or "arm64" in ansible_architecture'

- name: Assert that the system architecture is supported.
  ansible.builtin.assert:
    that:
      - mcp_proxy_download_arch is defined

- name: Ensure tesseract user exists.
  ansible.builtin.user:
    name: "{{ tesseract_username }}"

- name: Ensure tar is installed.
  ansible.builtin.package:
    name:
      - tar
    state: present
    update_cache: true

- name: Create mcp-proxy directory.
  ansible.builtin.file:
    path: /opt/mcp-proxy
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Seed npm package list.
  ansible.builtin.set_fact:
    mcp_proxy_npm_packages_to_install: "{{ mcp_proxy_npm_packages | list }}"

- name: Detect npm packages from npx MCP server definitions.
  vars:
    mcp_proxy_detected_npm_package: >-
      {{
        ((item.value.args | default([]))
        | reject('match', '^-')
        | list
        | first)
        | default('')
      }}
  ansible.builtin.set_fact:
    mcp_proxy_npm_packages_to_install: >-
      {{ (mcp_proxy_npm_packages_to_install + [mcp_proxy_detected_npm_package]) | unique }}
  loop: "{{ mcp_proxy_servers | dict2items }}"
  when:
    - mcp_proxy_auto_install_npx_servers
    - item.value.command | default('') == 'npx'
    - mcp_proxy_detected_npm_package | length > 0

- name: Ensure Node.js and npm are installed for npx servers.
  ansible.builtin.package:
    name: "{{ mcp_proxy_nodejs_packages }}"
    state: present
    update_cache: true
  when: mcp_proxy_npm_packages_to_install | length > 0

- name: Create npm prefix directory.
  ansible.builtin.file:
    path: "{{ mcp_proxy_npm_prefix }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: mcp_proxy_npm_packages_to_install | length > 0

- name: Install npm packages for npx MCP servers.
  notify: restart mcp_proxy
  ansible.builtin.command:
    argv:
      - npm
      - install
      - --prefix
      - "{{ mcp_proxy_npm_prefix }}"
      - "{{ item }}"
  environment:
    NPM_CONFIG_AUDIT: 'false'
    NPM_CONFIG_FUND: 'false'
    NPM_CONFIG_UPDATE_NOTIFIER: 'false'
  register: mcp_proxy_npm_install_result
  changed_when: >-
    'up to date' not in (mcp_proxy_npm_install_result.stdout | lower)
    and 'up to date' not in (mcp_proxy_npm_install_result.stderr | lower)
  loop: "{{ mcp_proxy_npm_packages_to_install }}"
  when: mcp_proxy_npm_packages_to_install | length > 0

- name: Download mcp-proxy archive.
  vars:
    mcp_proxy_archive_url: >-
      https://github.com/tbxark/mcp-proxy/releases/download/v{{ mcp_proxy_version }}/
      mcp-proxy_{{ mcp_proxy_version }}_linux_{{ mcp_proxy_download_arch }}.tar.gz
    mcp_proxy_archive_path: >-
      /tmp/mcp-proxy-{{ mcp_proxy_version }}-linux-{{ mcp_proxy_download_arch }}.tar.gz
  ansible.builtin.get_url:
    url: "{{ mcp_proxy_archive_url }}"
    dest: "{{ mcp_proxy_archive_path }}"
    mode: '0644'
  register: mcp_proxy_download_result
  retries: 5
  delay: 10
  until: mcp_proxy_download_result is succeeded

- name: Unarchive mcp-proxy from archive.
  vars:
    mcp_proxy_archive_path: >-
      /tmp/mcp-proxy-{{ mcp_proxy_version }}-linux-{{ mcp_proxy_download_arch }}.tar.gz
    mcp_proxy_version_marker: >-
      /opt/mcp-proxy/.mcp-proxy-{{ mcp_proxy_version }}-{{ mcp_proxy_download_arch }}
  notify: restart mcp_proxy
  ansible.builtin.unarchive:
    src: "{{ mcp_proxy_archive_path }}"
    dest: /opt/mcp-proxy/
    remote_src: true
    extra_opts:
      - "--overwrite"
    creates: "{{ mcp_proxy_version_marker }}"
    owner: root
    group: root
    mode: '0755'

- name: Mark installed mcp-proxy version.
  vars:
    mcp_proxy_version_marker: >-
      /opt/mcp-proxy/.mcp-proxy-{{ mcp_proxy_version }}-{{ mcp_proxy_download_arch }}
  ansible.builtin.file:
    path: "{{ mcp_proxy_version_marker }}"
    state: touch
    owner: root
    group: root
    mode: '0644'

- name: Template mcp-proxy environment file.
  no_log: true
  notify: restart mcp_proxy
  ansible.builtin.template:
    src: templates/mcp-proxy.env.j2
    dest: /etc/default/mcp-proxy
    owner: root
    group: root
    mode: '0640'

- name: Template the mcp-proxy config file.
  notify: restart mcp_proxy
  ansible.builtin.template:
    src: templates/config.json.j2
    dest: /opt/mcp-proxy/config.json
    owner: root
    group: root
    mode: '0644'

- name: Deploy systemd service.
  notify: restart mcp_proxy
  ansible.builtin.template:
    src: templates/mcp-proxy.service.j2
    dest: /etc/systemd/system/mcp-proxy.service
    owner: root
    group: root
    mode: '0644'

- name: Enable and start mcp-proxy.
  ansible.builtin.systemd:
    name: mcp-proxy
    enabled: true
    state: started
