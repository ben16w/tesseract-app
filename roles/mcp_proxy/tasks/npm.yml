---

- name: Ensure Node.js and npm are installed.
  ansible.builtin.package:
    name:
      - nodejs
      - npm
    state: present
    update_cache: true

- name: Create npm prefix directory.
  ansible.builtin.file:
    path: /opt/mcp-proxy/npm
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Install npm packages.
  notify: restart mcp_proxy
  ansible.builtin.command: "npm install --prefix /opt/mcp-proxy/npm {{ item }}"
  environment:
    NPM_CONFIG_AUDIT: 'false'
    NPM_CONFIG_FUND: 'false'
    NPM_CONFIG_UPDATE_NOTIFIER: 'false'
  register: mcp_proxy_npm_install_result
  changed_when: >-
    'up to date' not in (mcp_proxy_npm_install_result.stdout | lower)
    and 'up to date' not in (mcp_proxy_npm_install_result.stderr | lower)
  loop: "{{ mcp_proxy_npm_packages }}"
