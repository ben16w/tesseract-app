---
- name: Ensure litellm user exists
  ansible.builtin.user:
    name: "{{ litellm_proxy_user }}"
    group: "{{ litellm_proxy_group }}"
    system: true
    create_home: false

- name: Ensure python3 and venv are installed
  ansible.builtin.package:
    name:
      - python3
      - python3-venv
    state: present

- name: Create litellm directory
  ansible.builtin.file:
    path: "/opt/litellm"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create litellm venv directory
  ansible.builtin.file:
    path: "/opt/litellm/venv"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create venv
  ansible.builtin.command:
    cmd: python3 -m venv /opt/litellm/venv
    creates: "/opt/litellm/venv/bin/activate"

- name: Install LiteLLM[proxy] in venv
  ansible.builtin.command:
    cmd: "/opt/litellm/venv/bin/pip install 'litellm[proxy]'"
  environment:
    VIRTUAL_ENV: "/opt/litellm/venv"
    PATH: "/opt/litellm/venv/bin:{{ ansible_env.PATH }}"
  creates: "/opt/litellm/venv/bin/litellm"

- name: Template the LiteLLM config file
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "/opt/litellm/config.yaml"
    owner: root
    group: root
    mode: '0755'

- name: Deploy systemd service
  ansible.builtin.template:
    src: litellm-proxy.service.j2
    dest: "/etc/systemd/system/litellm.service"
    owner: root
    group: root
    mode: '0755'
  notify: Restart litellm proxy

- name: Enable and start litellm proxy
  ansible.builtin.systemd:
    name: "litellm"
    enabled: true
    state: started
