---

- name: Assert that all required inputs have been provided.
  ansible.builtin.assert:
    that:
      - litellm_version is not none
      - litellm_version is string
      - litellm_models is iterable
      - litellm_models | rejectattr('model_name', 'defined') | list | length == 0
      - litellm_mcp_servers is mapping
      - litellm_mcp_extra_allowed_commands is iterable
      - litellm_mcp_install_npx is boolean
      - litellm_mcp_install_uvx is boolean
      - litellm_headroom_enabled is boolean
      - litellm_headroom_port is number
      - not litellm_headroom_enabled or (litellm_headroom_version is not none and litellm_headroom_version is string)

- name: Ensure tesseract user exists.
  register: tesseract_user_details
  ansible.builtin.user:
    name: "{{ tesseract_username }}"

- name: Ensure python3 and venv are installed.
  ansible.builtin.package:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create litellm directory.
  ansible.builtin.file:
    path: "/opt/litellm"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Install LiteLLM proxy in venv.
  ansible.builtin.pip:
    name: litellm[proxy]
    version: "{{ litellm_version }}"
    virtualenv: /opt/litellm/venv
    virtualenv_command: python3 -m venv
    state: present
  notify: restart litellm

- name: Install nodejs and npm.
  when: litellm_mcp_install_npx
  ansible.builtin.package:
    name:
      - nodejs
      - npm
    state: present

- name: Install uv.
  when: litellm_mcp_install_uvx
  ansible.builtin.pip:
    name: uv
    virtualenv: /opt/litellm/venv
    virtualenv_command: python3 -m venv
    state: present

- name: Template the LiteLLM config file.
  ansible.builtin.template:
    src: templates/config.yaml.j2
    dest: "/opt/litellm/config.yaml"
    owner: root
    group: root
    mode: '0644'
  notify: restart litellm

- name: Deploy systemd service.
  ansible.builtin.template:
    src: templates/litellm.service.j2
    dest: "/etc/systemd/system/litellm.service"
    owner: root
    group: root
    mode: '0644'
  notify: restart litellm

- name: Configure logging.
  when: litellm_logging
  block:
    - name: Ensure logrotate is installed.
      ansible.builtin.package:
        name:
          - logrotate
        state: present

    - name: Create log directory.
      ansible.builtin.file:
        path: "/var/log/litellm"
        state: directory
        owner: "{{ tesseract_username }}"
        group: "{{ tesseract_username }}"
        mode: '0755'

    - name: Deploy logrotate configuration.
      ansible.builtin.template:
        src: templates/litellm_logrotate.j2
        dest: "/etc/logrotate.d/litellm"
        owner: root
        group: root
        mode: '0644'

- name: Install headroom proxy in venv.
  when: litellm_headroom_enabled
  ansible.builtin.pip:
    name: "headroom-ai[proxy,ml]"
    version: "{{ litellm_headroom_version }}"
    virtualenv: /opt/litellm/venv
    virtualenv_command: python3 -m venv
    state: present
  notify: restart headroom

- name: Deploy headroom systemd service.
  when: litellm_headroom_enabled
  ansible.builtin.template:
    src: templates/headroom.service.j2
    dest: "/etc/systemd/system/headroom.service"
    owner: root
    group: root
    mode: '0644'
  notify: restart headroom

- name: Enable and start headroom proxy.
  when: litellm_headroom_enabled
  ansible.builtin.systemd:
    name: "headroom"
    enabled: true
    state: started
    daemon_reload: true

- name: Enable and start LiteLLM proxy.
  ansible.builtin.systemd:
    name: "litellm"
    enabled: true
    state: started
    daemon_reload: true
