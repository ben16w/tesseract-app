---
- name: Prepare
  hosts: all
  tasks:
    - name: Ensure python3 and pip are installed.
      ansible.builtin.package:
        name:
          - python3
          - python3-pip
        state: present
        update_cache: true

    - name: Install mockllm package.
      ansible.builtin.pip:
        name: mockllm
        state: present

    - name: Download example responses file.
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/StacklokLabs/mockllm/main/example.responses.yml
        dest: /tmp/responses.yml
        mode: '0644'

    - name: Start mockllm server.
      ansible.builtin.shell: >
        nohup mockllm start
        --responses /tmp/responses.yml
        --port 8000
        >/tmp/mockllm.log 2>&1 &
      args:
        creates: /tmp/mockllm.log

    - name: Wait for mockllm server to start.
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8000
        state: started
        timeout: 30
