---

litellm_version: "1.92.0"
litellm_log_level: DEBUG
litellm_port: 3000
litellm_master_key: "sk-1234"
litellm_logging: true
litellm_headroom_enabled: true
litellm_headroom_version: "0.27.0"
litellm_mcp_install_npx: true
litellm_mcp_install_uvx: true
litellm_mcp_servers:
  npm_mock_mcp:
    transport: stdio
    command: npx
    args:
      - "@wrtnlabs/calculator-mcp"
  uv_mock_mcp:
    transport: stdio
    command: uvx
    args:
      - mcp-server-calculator
litellm_models:
  - model_name: mock-llm
    litellm_params:
      model: openai/mock-llm
      api_base: http://localhost:8000/v1
      api_key: sk-1234
