---
- name: Verify
  hosts: all
  vars_files:
    - vars.yml
  tasks:

    - name: Check binary exists in venv.
      ansible.builtin.stat:
        path: /opt/litellm/venv/bin
      register: litellm_bin
      failed_when: not litellm_bin.stat.exists

    - name: Check service is running.
      ansible.builtin.service:
        name: litellm
        state: started
      register: service_status
      failed_when: not service_status.state == 'started'

    - name: Check LiteLLM is listening on the correct port.
      ansible.builtin.wait_for:
        port: "{{ litellm_port }}"
        state: started
        timeout: 10
      register: port_check
      failed_when: not port_check.elapsed < 10

    - name: List models expecting failure without API key.
      ansible.builtin.uri:
        url: "http://localhost:{{ litellm_port }}/models"
        method: GET
        return_content: true
      register: model_list_response
      failed_when: model_list_response.status == 200

    - name: List models with master key.
      ansible.builtin.uri:
        url: "http://localhost:{{ litellm_port }}/models"
        method: GET
        return_content: true
        headers:
          Authorization: "Bearer {{ litellm_master_key }}"
      register: model_list_response_key
      failed_when: model_list_response_key.status != 200

    - name: Send chat completion request to mock-llm.
      ansible.builtin.uri:
        url: "http://localhost:{{ litellm_port }}/chat/completions"
        method: POST
        body_format: json
        status_code: 200
        headers:
          Authorization: "Bearer {{ litellm_master_key }}"
          Content-Type: "application/json"
        body:
          model: "mock-llm"
          messages:
            - role: "user"
              content: "Hello, mock-llm!"
      register: mock_llm_response

    - name: Assert mock-llm returned expected reply.
      ansible.builtin.assert:
        that:
          - mock_llm_response.json is defined
          - >
            mock_llm_response.json.choices[0].message.content ==
            "I don't know the answer to that. This is a mock response."

    - name: Call npm MCP add tool through LiteLLM proxy.
      ansible.builtin.uri:
        url: "http://localhost:{{ litellm_port }}/npm_mock_mcp/mcp"
        method: POST
        body_format: json
        return_content: true
        headers:
          Accept: "application/json, text/event-stream"
          Content-Type: "application/json"
          x-litellm-api-key: "Bearer {{ litellm_master_key }}"
        body:
          jsonrpc: "2.0"
          id: 3
          method: tools/call
          params:
            name: add
            arguments:
              a: 2
              b: 2
      register: litellm_mcp_tool_call_response
      failed_when: litellm_mcp_tool_call_response.status != 200

    - name: Assert LiteLLM proxies npm MCP requests successfully.
      ansible.builtin.assert:
        that:
          - "'The sum of 2 and 2 is 4' in litellm_mcp_tool_call_response.content"

    - name: Call uv MCP calculate tool through LiteLLM proxy.
      ansible.builtin.uri:
        url: "http://localhost:{{ litellm_port }}/uv_mock_mcp/mcp"
        method: POST
        body_format: json
        return_content: true
        headers:
          Accept: "application/json, text/event-stream"
          Content-Type: "application/json"
          x-litellm-api-key: "Bearer {{ litellm_master_key }}"
        body:
          jsonrpc: "2.0"
          id: 3
          method: tools/call
          params:
            name: calculate
            arguments:
              expression: "2+2"
      register: litellm_uv_mcp_tool_call_response
      failed_when: litellm_uv_mcp_tool_call_response.status != 200

    - name: Assert LiteLLM proxies uv MCP requests successfully.
      ansible.builtin.assert:
        that:
          - "'4' in litellm_uv_mcp_tool_call_response.content"

    - name: Check log file was created.
      ansible.builtin.stat:
        path: /var/log/litellm/proxy.log
      register: log_file
      failed_when: not log_file.stat.exists
