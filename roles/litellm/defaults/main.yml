---

tesseract_username: "tesseract"

litellm_version: ~ # e.g. "1.82.5"

litellm_port: 4000
litellm_listen_host: "0.0.0.0"

litellm_master_key: ~
litellm_cache: false

litellm_timeout: 1800 # 30 minutes

litellm_logging: true
litellm_log_level: "INFO"

litellm_modify_params: true

litellm_models: []
# Example:
# litellm_models:
#   - model_name: provider/model-name
#     litellm_params:
#       model: provider/model-id
#       api_key: "{{ some_api_key }}"   # required for external providers
#       api_base: "http://host:11434"   # required for self-hosted providers
#       reasoning_effort: {"effort": "high", "summary": "detailed"} # tune reasoning depth
#       use_chat_completions_api: true  # force Chat Completions endpoint instead of Responses
#       think: false                    # disable chain-of-thought (Ollama)
#     model_info:                       # declares capabilities for routing and validation
#       mode: responses                 # "responses" or "chat"; selects the API endpoint
#       supports_function_calling: true
#       supports_parallel_function_calling: true
#       supports_reasoning: true
#       supports_vision: true
#   - model_name: auto
#     litellm_params:
#       model: auto_router/complexity_router
#       complexity_router_config:
#         tiers:                        # map complexity tiers to model aliases
#           SIMPLE: local
#           MEDIUM: quick
#           COMPLEX: balanced
#           REASONING: smart
#       complexity_router_default_model: balanced

litellm_aliases: {}
# Example:
# litellm_aliases:
#   smart: provider/model-name # short name -> model_name defined above
#   local: ollama/model-name

litellm_fallbacks: []
# Example:
# litellm_fallbacks: # ordered list of aliases tried on failure
#   - smart
#   - local

litellm_mcp_servers: {}
# Example:
# litellm_mcp_servers:
#   my_http_server:
#     url: "https://my-mcp-server.com/mcp"
#     transport: "http"
#     description: "My custom MCP server"
#     auth_type: "api_key"
#     auth_value: "abc123"
#   circleci_mcp:
#     transport: "stdio"
#     command: "npx"
#     args: ["-y", "@circleci/mcp-server-circleci"]
#     env:
#       CIRCLECI_TOKEN: "your-circleci-token"
#       CIRCLECI_BASE_URL: "https://circleci.com"

litellm_mcp_extra_allowed_commands: [] # Extra commands to allow for stdio MCP servers.
litellm_mcp_install_npx: false # Install nodejs and npm (required for npx MCP servers).
litellm_mcp_install_uvx: false # Install uv (required for uvx MCP servers).

litellm_headroom_enabled: false # Install and run the Headroom prompt-compression sidecar service.
litellm_headroom_version: ~ # e.g. "0.27.0"
litellm_headroom_port: 8787
litellm_headroom_logging: true
litellm_headroom_log_level: "INFO"
