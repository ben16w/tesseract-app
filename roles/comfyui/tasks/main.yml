---

- name: Assert that all required inputs have been provided.
  ansible.builtin.assert:
    that:
      - comfyui_version is not none
      - not (comfyui_cpu_only and comfyui_install_rocm)
    fail_msg: "Cannot enable both CPU-only mode and ROCm installation"

- name: Ensure tesseract user exists.
  register: tesseract_user_details
  ansible.builtin.user:
    name: "{{ tesseract_username }}"

- name: Ensure required system packages are installed.
  ansible.builtin.package:
    name:
      - git
      - python3
      - python3-pip
      - python3-venv
      - wget
    state: present
    update_cache: true

- name: Install AMD ROCm.
  ansible.builtin.include_tasks: install_rocm.yml
  when: comfyui_install_rocm is true

- name: Create ComfyUI directory.
  ansible.builtin.file:
    path: "{{ comfyui_install_path }}"
    state: directory
    owner: "{{ tesseract_username }}"
    group: "{{ tesseract_username }}"
    mode: '0755'

- name: Clone ComfyUI repository.
  ansible.builtin.git:
    repo: https://github.com/comfyanonymous/ComfyUI.git
    dest: "{{ comfyui_install_path }}"
    version: "{{ comfyui_version }}"
    force: true
  become: true
  become_user: "{{ tesseract_username }}"
  notify: restart comfyui

- name: Create venv directory.
  ansible.builtin.file:
    path: "{{ comfyui_install_path }}/venv"
    state: directory
    owner: "{{ tesseract_username }}"
    group: "{{ tesseract_username }}"
    mode: '0755'

- name: Create Python venv.
  ansible.builtin.command:
    cmd: python3 -m venv venv
    chdir: "{{ comfyui_install_path }}"
    creates: "{{ comfyui_install_path }}/venv/bin/activate"
  become: true
  become_user: "{{ tesseract_username }}"

- name: Install PyTorch for AMD ROCm.
  when: comfyui_install_rocm is true
  ansible.builtin.pip:
    name:
      - torch
      - torchvision
      - torchaudio
    extra_args: "--index-url https://download.pytorch.org/whl/rocm6.2"
    virtualenv: "{{ comfyui_install_path }}/venv"
  become: true
  become_user: "{{ tesseract_username }}"
  notify: restart comfyui

- name: Install PyTorch for CPU.
  when: comfyui_cpu_only is true
  ansible.builtin.pip:
    name:
      - torch
      - torchvision
      - torchaudio
    extra_args: "--index-url https://download.pytorch.org/whl/cpu"
    virtualenv: "{{ comfyui_install_path }}/venv"
  become: true
  become_user: "{{ tesseract_username }}"
  notify: restart comfyui

- name: Install ComfyUI requirements.
  ansible.builtin.pip:
    requirements: "{{ comfyui_install_path }}/requirements.txt"
    virtualenv: "{{ comfyui_install_path }}/venv"
  become: true
  become_user: "{{ tesseract_username }}"
  notify: restart comfyui

- name: Deploy systemd service.
  ansible.builtin.template:
    src: templates/comfyui.service.j2
    dest: /etc/systemd/system/comfyui.service
    owner: root
    group: root
    mode: '0644'
  notify: restart comfyui

- name: Enable and start ComfyUI service.
  ansible.builtin.systemd:
    name: comfyui
    enabled: true
    state: started
