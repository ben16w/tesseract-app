---
- name: Enable i386 architecture
  ansible.builtin.command: dpkg --add-architecture i386
  register: steam_add_arch
  changed_when: "'already' not in (steam_add_arch.stderr | default(''))"
  when: steam_enable_i386_architecture | bool

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - software-properties-common
      - apt-transport-https
      - ca-certificates
    state: present
    update_cache: true

- name: Download Steam GPG key
  ansible.builtin.get_url:
    url: "https://repo.steampowered.com/steam/archive/precise/steam.gpg"
    dest: /usr/share/keyrings/steam.gpg
    owner: root
    group: root
    mode: '0644'

- name: Add Steam apt repository
  ansible.builtin.copy:
    content: |
      deb [arch=amd64,i386 signed-by=/usr/share/keyrings/steam.gpg] https://repo.steampowered.com/steam/ stable steam
    dest: /etc/apt/sources.list.d/steam-stable.list
    owner: root
    group: root
    mode: '0644'

- name: Install Steam streaming packages
  ansible.builtin.apt:
    name:
      - steam-launcher
      - mesa-vulkan-drivers
      - mesa-vulkan-drivers:i386
      - libgl1-mesa-dri:amd64
      - libgl1-mesa-dri:i386
      - libgl1-mesa-glx:amd64
      - libgl1-mesa-glx:i386
      - libegl1-mesa
      - libegl1-mesa:i386
      - libgbm1
      - libgbm1:i386
      - libva2
      - libva2:i386
      - libpipewire-0.3-0
      - pipewire
      - pipewire-pulse
      - wireplumber
      - xwayland
      - xdg-desktop-portal
      - xdg-user-dirs
      - dbus-user-session
      - pulseaudio-utils
      - psmisc
      - procps
    state: present
    update_cache: true
